services:
  dockge:
    image: ${DOCKGE_IMAGE:-louislam/dockge:1}
    restart: unless-stopped
    ports:
      - ${DOCKGE_PORT:-5001}:5001
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${APPDATA_DIR:-/opt/appdata}/dockge/data:/app/data
      # Stacks Directory
      # ⚠️ READ IT CAREFULLY. If you did it wrong, your data could end up writing into a WRONG PATH.
      # ⚠️ 1. FULL path only. No relative path (MUST)
      # ⚠️ 2. Left Stacks Path === Right Stacks Path (MUST)
      - ${DOCKGE_STACKS_DIR:-/opt/stacks}:${DOCKGE_STACKS_DIR:-/opt/stacks}
      - ${DOCKGE_STACKS_DIR:-/opt/stacks}/../.env.global:${DOCKGE_STACKS_DIR:-/opt/stacks}/../.env.global:ro
    environment:
      # Tell Dockge where to find the stacks
      - DOCKGE_STACKS_DIR=${DOCKGE_STACKS_DIR:-/opt/stacks}
      - DOCKGE_ENABLE_CONSOLE=${DOCKGE_ENABLE_CONSOLE:-true}
    labels:
      - "homepage.group=Managers"
      - "homepage.name=Dockge"
      - "homepage.icon=dockge"
      - "homepage.href=${DOCKGE_HOMEPAGE_HREF:-http://${SYS_IP}:5001}"
      - "homepage.description=Compose Management"

