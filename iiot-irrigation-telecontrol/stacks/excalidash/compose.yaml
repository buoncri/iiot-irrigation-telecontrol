services:
  backend:
    image: zimengxiong/excalidash-backend:latest
    container_name: excalidash-backend
    restart: unless-stopped
    ports:
      - 8040:8000
    volumes:
      - ${APPDATA_DIR:-/opt/appdata}/excalidash/data:/app/prisma
      - ${APPDATA_DIR:-/opt/appdata}/excalidash/uploads:/app/uploads
    environment:
      - DATABASE_URL=file:/app/prisma/dev.db
      - PORT=8000
      - NODE_ENV=production
      # Disabilita CSRF
      - CSRF_ENABLED=false
      # CORS per HTTP
      - CORS_ORIGIN=http://${SYS_IP}:6767
      - CSRF_TRUSTED_ORIGINS=http://${SYS_IP}:6767
      # CORS per WebSocket
      - CORS_ALLOW_ORIGIN=http://${SYS_IP}:6767
      - CORS_ALLOW_CREDENTIALS=true
      - CORS_ALLOW_METHODS=GET,POST,PUT,DELETE,OPTIONS
      - CORS_ALLOW_HEADERS=Content-Type,Authorization,X-Requested-With
      # Socket.io specific
      - SOCKET_IO_CORS_ORIGIN=http://${SYS_IP}:6767
      - SOCKET_IO_CORS_CREDENTIALS=true
      # Altre impostazioni
      - SESSION_SECRET=${SESSION_SECRET}
      - COOKIE_SECURE=false
      - COOKIE_SAMESITE=lax
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_MAX_AGE=604800
      # Prova variabili 
      - FRONTEND_URL=http://${SYS_IP}:6767
      - ALLOWED_ORIGINS=http://${SYS_IP}:6767,http://localhost:6767
      - CORS_ORIGINS=http://${SYS_IP}:6767,http://localhost:6767
      # quelle che già ...
      #- CORS_ORIGIN=http://${SYS_IP}:6767
      #- CORS_ALLOW_ORIGIN=http://${SYS_IP}:6767
    healthcheck:
      # test:
      #   - CMD
      #   - wget
      #   - --no-verbose
      #   - --tries=5
      #   - --spider
      #   - http://localhost:8000/
      test:
        - CMD
        - echo
        - ok
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - iiot_internal
    command: |
      sh -c "npx prisma migrate deploy && node server.js"
  frontend:
    image: zimengxiong/excalidash-frontend:latest
    container_name: excalidash-frontend
    restart: unless-stopped
    ports:
      - 6767:80
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    environment:
      - VITE_API_URL=http://${SYS_IP}:8040
      - VITE_CSRF_ENABLED=false
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - iiot_internal
    labels:
      - autoheal=true
      - homepage.group=Applications
      - homepage.name=Excalidash
      - homepage.description=Diagram Editor
      - homepage.icon=dashboard-icons
      - homepage.href=http://${SYS_IP:-127.0.0.1}:6767

networks:
  iiot_internal:
    external: true
