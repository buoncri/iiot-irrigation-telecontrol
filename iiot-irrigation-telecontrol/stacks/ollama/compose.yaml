services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    environment:
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-5m}
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-1}
    volumes:
      - ${APPDATA_DIR:-/opt/iiot-irrigation-telecontrol/appdata}/ollama/models:/root/.ollama
      - ${APPDATA_DIR:-/opt/iiot-irrigation-telecontrol/appdata}/ollama/data:/data
    networks:
      - iiot_internal
    restart: unless-stopped

  ollama_ui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ollama_ui
    depends_on:
      - ollama
    ports:
      - ${OLLAMA_UI_PORT:-8011}:8080
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_AUTH=${WEBUI_AUTH:-True}
      - WEBUI_NAME=${WEBUI_NAME:-IIoT Assistant}
      - DEFAULT_USER_ROLE=${DEFAULT_USER_ROLE:-user}
      - ENABLE_SIGNUP=${ENABLE_SIGNUP:-False}
    volumes:
      - ${APPDATA_DIR:-/opt/iiot-irrigation-telecontrol/appdata}/ollama/open-webui:/app/backend/data
    networks:
      - iiot_internal
    labels:
      - homepage.group=Applications
      - homepage.name=Ollama UI
      - homepage.icon=sh-ollama
      - homepage.description=Assistente locale su documenti interni
      - homepage.href=http://${SYS_IP}:${OLLAMA_UI_PORT:-8011}
    restart: unless-stopped

networks:
  iiot_internal:
    external: true
