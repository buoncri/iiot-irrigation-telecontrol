server {
    listen 8080;

    # Aumenta il timeout per le connessioni WebSocket e upload grandi
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    # Limite upload oggetti
    client_max_body_size 100m;

    # --- Backend API (speckle-server) ---
    location ~* ^/(api|graphql|explorer|auth(?!n)|objects|metrics|static|favicon\.ico) {
        proxy_pass         http://speckle-server:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $http_host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --- Frontend (catch-all → speckle-frontend-2) ---
    location / {
        proxy_pass         http://speckle-frontend-2:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $http_host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
