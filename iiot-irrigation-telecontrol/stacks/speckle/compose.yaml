name: speckle
services:
  postgres:
    image: postgres:16.9-alpine
    restart: always
    environment:
      POSTGRES_DB: ${SPECKLE_POSTGRES_DB:-speckle}
      POSTGRES_USER: ${SPECKLE_POSTGRES_USER:-speckle}
      POSTGRES_PASSWORD: ${SPECKLE_POSTGRES_PASSWORD:-speckle}
    volumes:
      - ${APPDATA_DIR:-/opt/appdata}/speckle/postgres-data:/var/lib/postgresql/data/
    networks:
      - iiot_internal
  redis:
    image: valkey/valkey:8-alpine
    restart: always
    volumes:
      - ${APPDATA_DIR:-/opt/appdata}/speckle/redis-data:/data
    networks:
      - iiot_internal
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    restart: always
    ports:
      - ${SPECKLE_MINIO_PORT:-9000}:9000
    volumes:
      - ${APPDATA_DIR:-/opt/appdata}/speckle/minio-data:/data
    networks:
      - iiot_internal
  speckle-ingress:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - ${SPECKLE_PORT:-3030}:8080
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - speckle-frontend-2
      - speckle-server
    networks:
      - iiot_internal
    labels:
      - homepage.group=BIM&GIS
      - homepage.name=Speckle
      - homepage.icon=homebox
      - homepage.href=http://${SYS_IP}:${SPECKLE_PORT:-3030}
      - homepage.description=Gestione dati AEC (BIM/IFC)
  speckle-frontend-2:
    image: speckle/speckle-frontend-2:latest
    restart: always
    environment:
      NUXT_PUBLIC_SERVER_NAME: ${SPECKLE_SERVER_NAME:-local}
      NUXT_PUBLIC_API_ORIGIN: ${SPECKLE_CANONICAL_URL}
      NUXT_PUBLIC_BACKEND_API_ORIGIN: http://speckle-server:3000
      NUXT_PUBLIC_BASE_URL: ${SPECKLE_CANONICAL_URL}
      NUXT_REDIS_URL: redis://redis
      NUXT_PUBLIC_SSL_ENABLED: ${SPECKLE_SSL_ENABLED:-false}
    networks:
      - iiot_internal
  speckle-server:
    image: speckle/speckle-server:latest
    restart: always
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      CANONICAL_URL: ${SPECKLE_CANONICAL_URL}
      SESSION_SECRET: ${SPECKLE_SESSION_SECRET}
      STRATEGY_LOCAL: "true"
      POSTGRES_URL: postgres
      POSTGRES_USER: ${SPECKLE_POSTGRES_USER:-speckle}
      POSTGRES_PASSWORD: ${SPECKLE_POSTGRES_PASSWORD:-speckle}
      POSTGRES_DB: ${SPECKLE_POSTGRES_DB:-speckle}
      REDIS_URL: redis://redis
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${SPECKLE_S3_PUBLIC_ENDPOINT}
      S3_ACCESS_KEY: ${SPECKLE_MINIO_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${SPECKLE_MINIO_SECRET_KEY:-minioadmin}
      S3_BUCKET: speckle-server
      S3_CREATE_BUCKET: "true"
      FRONTEND_ORIGIN: ${SPECKLE_CANONICAL_URL}
      EMAIL: ${SPECKLE_EMAIL_ENABLED:-false}
      EMAIL_HOST: ${SPECKLE_EMAIL_HOST:-}
      EMAIL_PORT: ${SPECKLE_EMAIL_PORT:-587}
      EMAIL_USERNAME: ${SPECKLE_EMAIL_USERNAME:-}
      EMAIL_PASSWORD: ${SPECKLE_EMAIL_PASSWORD:-}
      EMAIL_SECURE: ${SPECKLE_EMAIL_SECURE:-false}
      EMAIL_REQUIRE_TLS: ${SPECKLE_EMAIL_REQUIRE_TLS:-true}
      EMAIL_FROM: ${SPECKLE_EMAIL_FROM:-}
    networks:
      - iiot_internal
  preview-service:
    image: speckle/speckle-preview-service:latest
    restart: always
    depends_on:
      - speckle-server
    environment:
      REDIS_URL: redis://redis
      PORT: "9001"
    networks:
      - iiot_internal
  webhook-service:
    image: speckle/speckle-webhook-service:latest
    restart: always
    depends_on:
      - speckle-server
    environment:
      PG_CONNECTION_STRING: postgres://${SPECKLE_POSTGRES_USER:-speckle}:${SPECKLE_POSTGRES_PASSWORD:-speckle}@postgres/${SPECKLE_POSTGRES_DB:-speckle}
    networks:
      - iiot_internal
  fileimport-service:
    image: speckle/speckle-fileimport-service:latest
    restart: always
    depends_on:
      - speckle-server
    environment:
      SPECKLE_SERVER_URL: http://speckle-server:3000
      PG_CONNECTION_STRING: postgres://${SPECKLE_POSTGRES_USER:-speckle}:${SPECKLE_POSTGRES_PASSWORD:-speckle}@postgres/${SPECKLE_POSTGRES_DB:-speckle}
      REDIS_URL: redis://redis
    networks:
      - iiot_internal
networks:
  iiot_internal:
    external: true
