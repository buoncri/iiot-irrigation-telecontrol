---
# Label principale ------------
- greeting:
    text_size: xl
    text: IIoT Server

# Widget di ricerca -----------
- search:
    provider: duckduckgo
    target: _blank
    focus: true
    showSearchIcon: true
    placeholder: "Cerca ..."

# Meteo -----------------------
- openmeteo:
    label: loc. Trevi # optional
    latitude: 42.86566586745911
    longitude: 12.737591888271927
    timezone: Europe/Vatican # optional
    units: metric # or imperial
    cache: 5 # Time in minutes to cache API responses, to stay within limits
    format: # optional, Intl.NumberFormat options
      maximumFractionDigits: 1

# Risorse di sistema ----------------
- resources:
    label: Informazioni di sistema
    cpu: true
    memory: true
    disk: /
    # uptime: true

