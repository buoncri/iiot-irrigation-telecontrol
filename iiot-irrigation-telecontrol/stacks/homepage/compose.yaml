services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    environment:
      HOMEPAGE_ALLOWED_HOSTS: "*"
      HOMEPAGE_VAR_SYS_IP: ${SYS_IP}
      PGID: 1000
    networks:
      - iiot_internal
    ports:
      - 3000:3000
    volumes:
      - ./config:/app/config
      - ${APPDATA_DIR:-/opt/appdata}/homepage/logs:/app/config/logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - homepage.name=Homepage Docker App
      - homepage.group=Managers
      - homepage.icon=homepage.png
      - homepage.description=Dynamic Home Page
      - homepage.href=http://${SYS_IP}:3000
    restart: unless-stopped
networks:
  iiot_internal:
    external: true
