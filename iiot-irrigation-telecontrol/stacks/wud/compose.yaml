services:
  whatsupdocker:
    image: getwud/wud
    container_name: wud
    environment:
      - WUD_SERVER_PORT=3010
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/appdata/wud:/store # Cartella per i dati persistenti
    ports:
      - 3010:3010 # Cambiata da 3000 a 3010ì
# networks: {}
    networks:
      - iiot_internal
    restart: always
    labels:
      - homepage.group=Managers
      - homepage.name=WUD
      - homepage.icon=whats-up-docker.png
      - homepage.description=Monitor aggiornamenti Docker
      - homepage.href=http://${SYS_IP}:3010

networks:
  iiot_internal:
    external: true
