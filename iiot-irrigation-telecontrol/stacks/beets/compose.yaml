services:
  beets:
    image: lscr.io/linuxserver/beets:latest
    container_name: beets
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ${APPDATA_DIR:-/opt/appdata}/beets/config:/config
      - ${APPDATA_DIR:-/opt/appdata}/beets/music:/music
      - ${APPDATA_DIR:-/opt/appdata}/beets/ingest:/downloads
    networks:
      - iiot_internal
    ports:
      - 8337:8337
    labels:
      # - autoheal=true
      - homepage.group=Multimedia
      - homepage.name=Beets
      - homepage.description=Music library manager
      - homepage.icon=beets
      - homepage.href=http://${SYS_IP}:8337
    restart: unless-stopped
networks:
  iiot_internal:
    external: true
