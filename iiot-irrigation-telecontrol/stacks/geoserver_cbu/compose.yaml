services:
  geoserver:
    stdin_open: true
    tty: true
    networks:
      - iiot_internal
    ports:
      - 8080:8080
    environment:
      - INSTALL_EXTENSIONS=true
      - STABLE_EXTENSIONS=ysld,ogcapi-features
      - GEOSERVER_ADMIN_USER=${GEOSERVER_ADMIN_USER}
      - GEOSERVER_ADMIN_PASSWORD=${GEOSERVER_ADMIN_PASSWORD}
    image: docker.osgeo.org/geoserver:2.28.0
    labels:
      - homepage.group=BIM&GIS
      - homepage.name=GeoServer
      - homepage.icon=freeipa # TODO cambiare
      - homepage.href=${GEOSERVER_HOMEPAGE_HREF:-https://${SYS_IP}:8080/geoserver}
      - homepage.description=GeoServer Docker Container
networks:
  iiot_internal:
    external: true
