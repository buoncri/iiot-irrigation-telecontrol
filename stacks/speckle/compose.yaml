name: 'speckle-server'

services:
  postgres:
    image: 'postgres:16.9-alpine'
    restart: always
    environment:
      POSTGRES_DB: speckle
      POSTGRES_USER: speckle
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /opt/appdata/speckle/postgres-data:/var/lib/postgresql/data/

  redis:
    image: 'valkey/valkey:8-alpine'
    restart: always
    volumes:
      - /opt/appdata/speckle/redis-data:/data

  minio:
    image: 'minio/minio'
    command: server /data --console-address ":9001"
    restart: always
    ports:
      - '${SPECKLE_BIND_IP}:${SPECKLE_MINIO_HOST_PORT}:9000'
    volumes:
      - /opt/appdata/speckle/minio-data:/data

  speckle-ingress:
    image: speckle/speckle-docker-compose-ingress:latest
    restart: always
    ports:
      - '${SPECKLE_BIND_IP}:${SPECKLE_INGRESS_HOST_PORT}:8080'

  speckle-frontend-2:
    image: speckle/speckle-frontend-2:latest
    restart: always
    environment:
      NUXT_PUBLIC_SERVER_NAME: 'local'
      NUXT_PUBLIC_API_ORIGIN: ${SPECKLE_BASE_URL}
      NUXT_PUBLIC_BACKEND_API_ORIGIN: 'http://speckle-server:3000'
      NUXT_PUBLIC_BASE_URL: ${SPECKLE_BASE_URL}
      NUXT_REDIS_URL: 'redis://redis'
      # Set to true if running it w/ SSL
      NUXT_PUBLIC_SSL_ENABLED: 'false'

  speckle-server:
    image: speckle/speckle-server:latest
    restart: always
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      CANONICAL_URL: ${SPECKLE_BASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      STRATEGY_LOCAL: 'true'
      POSTGRES_URL: 'postgres'
      POSTGRES_USER: 'speckle'
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: 'speckle'
      REDIS_URL: 'redis://redis'
      S3_ENDPOINT: 'http://minio:9000'
      S3_PUBLIC_ENDPOINT: ${SPECKLE_S3_PUBLIC_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: 'speckle-server'
      FRONTEND_ORIGIN: ${SPECKLE_BASE_URL}
      EMAIL: 'true'
      EMAIL_HOST: 'your-email-host-domain-here'
      EMAIL_PORT: '587' # or another SMTP compatible port as defined by your transactional (SMTP relay) email provider
      EMAIL_USERNAME: 'your-email-service-username'
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      EMAIL_SECURE: 'false' # enable to require SSL (Note that TLS is often preferred; see EMAIL_REQUIRE_TLS)
      EMAIL_REQUIRE_TLS: 'true' # enable to require TLS. Disable if SSL is used instead.
      EMAIL_FROM: 'an-email-address-you-own-and-configured-with-your-transactional-email-provider@example.org'

  preview-service:
    image: speckle/speckle-preview-service:latest
    restart: always
    depends_on:
      - speckle-server
    environment:
      REDIS_URL: 'redis://redis'

  webhook-service:
    image: speckle/speckle-webhook-service:latest
    restart: always
    depends_on:
      - speckle-server
    environment:
      PG_CONNECTION_STRING: ${PG_CONNECTION_STRING}

  fileimport-service:
    image: speckle/speckle-fileimport-service:latest
    restart: always
    depends_on:
      - speckle-server
    environment:
      SPECKLE_SERVER_URL: 'http://speckle-server:3000'
      PG_CONNECTION_STRING: ${PG_CONNECTION_STRING}
